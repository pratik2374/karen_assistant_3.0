version: '3.8'

# Chaos Testing Infrastructure
# Run with: docker compose -f docker-compose.chaos.yml up

services:
  mongo-chaos:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=karen_chaos
    # Simulate network partition using toxiproxy if needed in advanced tests
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis-chaos:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Toxiproxy to simulate latency, bandwidth restrictions, and partitions
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy
    ports:
      - "8474:8474"   # Toxiproxy API
      - "27018:27018" # Proxy to Mongo
      - "6380:6380"   # Proxy to Redis
